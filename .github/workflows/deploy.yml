name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Set repository variable EC2_HOST to your public IPv4 when it changes (no Elastic IP).
      # GitHub → Settings → Secrets and variables → Actions → Variables → EC2_HOST
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.EC2_HOST != '' && vars.EC2_HOST || '16.16.96.232' }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            cd /home/ubuntu
            if [ ! -d "kins-CRM" ]; then
              git clone https://github.com/otahir-21/kins-CRM.git
            fi
            cd kins-CRM
            git pull origin main
            # Firestore-only CRM: append once so /api/groups etc. skip Mongo (503) when Atlas isn’t used.
            # To disable: GitHub repo → Settings → Actions → Variables → CRM_SKIP_FIREBASE_ENV = true
            if [ "${{ vars.CRM_SKIP_FIREBASE_ENV }}" != "true" ]; then
              touch .env
              if ! grep -q '# KINS_CRM_CI_FIREBASE_DEFAULTS' .env 2>/dev/null; then
                printf '\n# KINS_CRM_CI_FIREBASE_DEFAULTS (do not remove — CI idempotency marker)\nUSE_MONGO=false\nDATA_BACKEND_DEFAULT=firebase\n' >> .env
              fi
            fi
            npm install
            npm run build
            pm2 restart kins-api || pm2 start server.js --name kins-api
